# ===========================================================================
# Example Docker Compose file
# ===========================================================================
#
# Purpose:
# --------
#
# This file is an example Docker Compose configuration for self hosting
# Sure on your local machine or on a cloud VPS.
#
# The configuration below is a "standard" setup that works out of the box,
# but if you're running this outside of a local network, it is recommended
# to set the environment variables for extra security.
#
# Setup:
# ------
#
# To run this, you should read the setup guide:
#
# https://github.com/we-promise/sure/blob/main/docs/hosting/docker.md
#
# Troubleshooting:
# ----------------
#
# Problems? Swing by our Discord or open a Discussion here:
#
# https://github.com/we-promise/sure/discussions/categories/general
#
# Outbound DNS / IPv6 note (Yahoo Finance, ChatGPT/Codex, others?):
# -----------------------------------------------------------------
# If you encounter "Failed to open TCP connection" errors to external hosts
# from inside the container, the issue may be that DNS resolves to an IPv6
# address first. Since IPv6 may not be configured in the container, the
# connection hangs. To work around this, you can pin provider hostnames to
# IPv4 addresses in the container's /etc/hosts with Docker Compose:
#
#   extra_hosts:
#     - "chatgpt.com:${CHATGPT_HOST_IPV4}"
#     - "auth.openai.com:${OPENAI_AUTH_HOST_IPV4}"
#     - "fc.yahoo.com:${YAHOO_FINANCE_COOKIE_HOST_IPV4}"
#     - "query1.finance.yahoo.com:${YAHOO_FINANCE_QUERY_HOST_IPV4}"
#     - "query2.finance.yahoo.com:${YAHOO_FINANCE_QUERY_HOST_IPV4}"
#
# Set those variables in your local .env file to current IPv4 addresses for
# your deployment region, then add the extra_hosts block to both web and worker.
# Or use explicit DNS servers that prefer IPv4 by uncommenting the `dns` sections
# on the web and worker services below.
#

x-db-env: &db_env
  POSTGRES_USER: ${POSTGRES_USER:-sure_user}
  POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sure_password}
  POSTGRES_DB: ${POSTGRES_DB:-sure_production}

x-rails-env: &rails_env
  <<: *db_env
  SECRET_KEY_BASE: ${SECRET_KEY_BASE:-a7523c3d0ae56415046ad8abae168d71074a79534a7062258f8d1d51ac2f76d3c3bc86d86b6b0b307df30d9a6a90a2066a3fa9e67c5e6f374dbd7dd4e0778e13}
  SELF_HOSTED: "true"
  RAILS_FORCE_SSL: "false"
  RAILS_ASSUME_SSL: "false"
  DB_HOST: db
  DB_PORT: 5432
  REDIS_URL: redis://redis:6379/1
  # LLM provider config.
  #
  # LLM_PROVIDER=openai uses OPENAI_ACCESS_TOKEN and may incur OpenAI API costs
  # when you use AI-related features in the app (chat, rules). Make sure you
  # have set appropriate spend limits on your account before adding this.
  #
  # LLM_PROVIDER=codex uses the server owner's Codex CLI ChatGPT auth. Run
  # `codex login` on the host, then set CODEX_HOME_HOST to the host directory
  # containing auth.json. Usage is backed by that ChatGPT/Codex plan rather than
  # an OpenAI API token.
  LLM_PROVIDER: ${LLM_PROVIDER:-openai}
  OPENAI_ACCESS_TOKEN: ${OPENAI_ACCESS_TOKEN:-}
  OPENAI_MODEL: ${OPENAI_MODEL:-}
  OPENAI_URI_BASE: ${OPENAI_URI_BASE:-}
  CODEX_HOME: /rails/.codex
  CODEX_AUTH_PATH: /rails/.codex/auth.json

services:
  web:
    image: ${SURE_IMAGE:-ghcr.io/we-promise/sure:stable}
    # To run from a local checkout instead of the published image, uncomment
    # this build block and set SURE_IMAGE=sure:local in your .env file.
    # build:
    #   context: .
    #   args:
    #     BUILD_COMMIT_SHA: ${BUILD_COMMIT_SHA:-local}
    volumes:
      - app-storage:/rails/storage
      - ${CODEX_HOME_HOST:-${HOME}/.codex}:/rails/.codex
    ports:
      - ${PORT:-3000}:3000
      # To also publish on IPv6 (dual-stack), uncomment the line below AND
      # set BINDING=:: in the environment block. See docs/hosting/docker.md
      # "Binding to IPv6" for details.
      # - "[::]:${PORT:-3000}:3000"
    restart: unless-stopped
    environment:
      <<: *rails_env
      # BINDING: "::"  # Uncomment for IPv6 dual-stack inside the container
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Optional: pin provider hostnames to IPv4 addresses if container DNS
    # resolves to unreachable IPv6 routes. Set the variables in .env first.
    # extra_hosts:
    #   - "chatgpt.com:${CHATGPT_HOST_IPV4}"
    #   - "auth.openai.com:${OPENAI_AUTH_HOST_IPV4}"
    #   - "fc.yahoo.com:${YAHOO_FINANCE_COOKIE_HOST_IPV4}"
    #   - "query1.finance.yahoo.com:${YAHOO_FINANCE_QUERY_HOST_IPV4}"
    #   - "query2.finance.yahoo.com:${YAHOO_FINANCE_QUERY_HOST_IPV4}"
    # dns:
    #   - 8.8.8.8
    #   - 1.1.1.1
    networks:
      - sure_net

  worker:
    image: ${SURE_IMAGE:-ghcr.io/we-promise/sure:stable}
    # To run from a local checkout instead of the published image, uncomment
    # this build block and set SURE_IMAGE=sure:local in your .env file.
    # build:
    #   context: .
    #   args:
    #     BUILD_COMMIT_SHA: ${BUILD_COMMIT_SHA:-local}
    command: bundle exec sidekiq
    volumes:
      - app-storage:/rails/storage
      - ${CODEX_HOME_HOST:-${HOME}/.codex}:/rails/.codex
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Optional: pin provider hostnames to IPv4 addresses if container DNS
    # resolves to unreachable IPv6 routes. Set the variables in .env first.
    # extra_hosts:
    #   - "chatgpt.com:${CHATGPT_HOST_IPV4}"
    #   - "auth.openai.com:${OPENAI_AUTH_HOST_IPV4}"
    #   - "fc.yahoo.com:${YAHOO_FINANCE_COOKIE_HOST_IPV4}"
    #   - "query1.finance.yahoo.com:${YAHOO_FINANCE_QUERY_HOST_IPV4}"
    #   - "query2.finance.yahoo.com:${YAHOO_FINANCE_QUERY_HOST_IPV4}"
    # dns:
    #   - 8.8.8.8
    #   - 1.1.1.1
    environment:
      <<: *rails_env
    networks:
      - sure_net

  db:
    image: postgres:16
    restart: unless-stopped
    volumes:
      - postgres-data:/var/lib/postgresql/data
    environment:
      <<: *db_env
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sure_net

  backup:
    profiles:
      - backup
    image: prodrigestivill/postgres-backup-local
    restart: unless-stopped
    volumes:
      - /opt/sure-data/backups:/backups # Change this path to your desired backup location on the host machine
    environment:
      - POSTGRES_HOST=db
      - POSTGRES_DB=${POSTGRES_DB:-sure_production}
      - POSTGRES_USER=${POSTGRES_USER:-sure_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-sure_password} # pipelock:ignore
      - SCHEDULE=@daily # Runs once a day at midnight
      - BACKUP_KEEP_DAYS=7 # Keeps the last 7 days of backups
      - BACKUP_KEEP_WEEKS=4 # Keeps 4 weekly backups
      - BACKUP_KEEP_MONTHS=6 # Keeps 6 monthly backups
    depends_on:
      - db
    networks:
      - sure_net

  redis:
    image: redis:latest
    restart: unless-stopped
    volumes:
      - redis-data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - sure_net

volumes:
  app-storage:
  postgres-data:
  redis-data:

networks:
  sure_net:
    driver: bridge
